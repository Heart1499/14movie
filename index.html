<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>小雨披大导演 · 锐因 不能出去的房间</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #0a0705;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: system-ui, -apple-system, 'Segoe UI', 'Helvetica Neue', sans-serif;
            padding: 12px;
        }

        .control-room {
            max-width: 550px;
            width: 100%;
            margin: 0 auto;
            background: #11100e;
            border-radius: 44px;
            box-shadow: 0 30px 50px rgba(0,0,0,0.6), 0 0 0 1px #4a3524 inset;
            overflow: hidden;
            position: relative;
        }

        .danmaku-area {
            position: relative;
            height: 100px;
            overflow: hidden;
            background: #050403;
            border-bottom: 1px solid #36281d;
            z-index: 10;
        }
        .danmaku-track {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        .danmaku {
            position: absolute;
            white-space: nowrap;
            font-size: 13px;
            font-family: monospace;
            color: #e2bc89;
            text-shadow: 0 0 3px #000;
            opacity: 0.9;
            pointer-events: none;
            animation: slideDanmaku 4s linear forwards;
            z-index: 20;
            font-weight: 500;
        }
        @keyframes slideDanmaku {
            0% { transform: translateX(100%); opacity: 0.8; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateX(-100%); opacity: 0; }
        }

        .camera-wall {
            background: #050403;
            padding: 12px 20px 12px;
            border-bottom: 2px solid #b87c4a;
        }

        .cam-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            color: #bfa98e;
            font-size: 10px;
        }

        .live-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #e34d4d;
            border-radius: 50%;
            box-shadow: 0 0 6px red;
            margin-right: 6px;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.4; transform: scale(0.8);}
            100% { opacity: 1; transform: scale(1);}
        }

        .room-preview {
            background: #0c0a08;
            border-radius: 28px;
            padding: 14px;
            border: 2px solid #36281d;
            transition: all 0.3s ease;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }
        .room-preview.high-escape {
            border-color: #d6955a;
            box-shadow: 0 0 15px rgba(214, 149, 90, 0.3);
        }
        .room-preview.full-escape {
            border-color: #e8a87c;
            background: #1a1511;
            box-shadow: 0 0 20px rgba(232, 168, 124, 0.4);
        }

        .characters-area {
            display: flex;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
            margin-bottom: 14px;
        }

        .char-card {
            background: #201a14;
            border-radius: 50px;
            padding: 6px 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 4px 0 #0b0805;
            border-bottom: 2px solid #d6955a;
            transition: all 0.2s;
        }
        .char-card.redden { border-bottom-color: #e8a87c; background: #2c2018; }

        .char-icon {
            width: 40px;
            height: 40px;
            background: #3f2c1d;
            border-radius: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            transition: all 0.2s;
        }
        .char-icon.blush { background: #8b5e3c; }

        .char-name {
            color: #f3cf9a;
            font-weight: bold;
            font-size: 14px;
        }

        .char-tag {
            font-size: 9px;
            color: #b49470;
        }

        .stats-area {
            background: #1f1914;
            border-radius: 24px;
            padding: 6px 12px;
            margin-top: 10px;
        }

        .stat-row {
            margin-bottom: 5px;
        }

        .stat-label {
            display: flex;
            justify-content: space-between;
            font-size: 9px;
            color: #e2bc89;
            margin-bottom: 2px;
        }

        .stat-bar-bg {
            background: #2a241f;
            height: 5px;
            border-radius: 10px;
            overflow: hidden;
        }

        .stat-bar-fill {
            height: 100%;
            border-radius: 10px;
            transition: width 0.2s;
        }

        .fill-s { background: #d97838; }
        .fill-h { background: #c96f5e; }
        .fill-escape { background: #4c9f70; }

        .cmd-count-badge {
            background: #2c241e;
            display: inline-block;
            padding: 2px 8px;
            border-radius: 30px;
            font-size: 8px;
            margin-top: 4px;
        }

        .action-log {
            background: #0d0b09;
            margin: 12px 14px 14px 14px;
            border-radius: 20px;
            padding: 12px 14px;
            color: #d7cdbc;
            font-size: 13px;
            font-family: monospace;
            border-left: 4px solid #d78c45;
            min-height: 120px;
            max-height: 150px;
            overflow-y: auto;
            line-height: 1.4;
        }

        .director-console {
            background: #1a1511;
            padding: 14px 16px 20px;
        }

        .section-title {
            font-size: 14px;
            font-weight: bold;
            color: #e7bc82;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
            border-left: 3px solid #e2a15b;
            padding-left: 10px;
        }

        .command-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 12px;
            max-height: 240px;
            overflow-y: auto;
        }

        .cmd-btn {
            background: #2c221b;
            border: 1px solid #745d45;
            color: #ffefdb;
            padding: 6px 10px;
            border-radius: 40px;
            font-family: monospace;
            font-weight: bold;
            font-size: 10px;
            cursor: pointer;
            flex: 1 0 auto;
            min-width: 65px;
            text-align: center;
            transition: all 0.05s linear;
        }
        .cmd-btn:active {
            background: #4e3725;
            transform: scale(0.96);
        }

        .toy-section {
            background: #2a221c;
            border-radius: 20px;
            padding: 10px;
            margin-bottom: 14px;
        }
        .toy-title {
            font-size: 11px;
            color: #e2bc89;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .toy-grid { display: flex; flex-wrap: wrap; gap: 6px; }
        .toy-btn {
            background: #3d2c1f;
            border: none;
            padding: 5px 10px;
            border-radius: 30px;
            color: #f0cfaa;
            font-size: 10px;
            cursor: pointer;
            transition: all 0.05s linear;
        }
        .toy-btn:active {
            background: #5e402c;
            transform: scale(0.96);
        }

        .director-interact {
            background: #2a221c;
            border-radius: 20px;
            padding: 10px;
            margin-bottom: 14px;
        }
        .talk-label {
            font-size: 10px;
            color: #e2bc89;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .interact-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 10px;
        }
        .interact-btn, .photo-btn {
            background: #3d2c1f;
            border: none;
            padding: 5px 10px;
            border-radius: 30px;
            color: #f0cfaa;
            font-size: 10px;
            cursor: pointer;
            transition: all 0.05s linear;
        }
        .interact-btn:active, .photo-btn:active {
            transform: scale(0.96);
        }
        .photo-btn { background: #5a3f2a; color: #ffefdb; }
        .talk-input-area {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }
        .talk-input {
            flex: 1;
            background: #1a1511;
            border: 1px solid #6a5642;
            border-radius: 40px;
            padding: 6px 10px;
            color: #f0e2d0;
            font-family: monospace;
            font-size: 11px;
            outline: none;
        }
        .send-btn {
            background: #4f3824;
            border: none;
            padding: 5px 12px;
            border-radius: 40px;
            color: white;
            cursor: pointer;
            font-size: 11px;
        }

        .name-input-area {
            display: flex;
            gap: 6px;
            margin-bottom: 12px;
            background: #1f1914;
            padding: 6px 10px;
            border-radius: 40px;
            align-items: center;
            flex-wrap: wrap;
        }
        .name-label { font-size: 10px; color: #e2bc89; }
        .name-input {
            flex: 1;
            background: #0f0d0b;
            border: 1px solid #6a5642;
            border-radius: 40px;
            padding: 5px 10px;
            color: #f0e2d0;
            font-size: 11px;
            outline: none;
        }
        .name-confirm {
            background: #5a3f2a;
            border: none;
            padding: 5px 12px;
            border-radius: 40px;
            color: white;
            cursor: pointer;
            font-size: 10px;
        }
        .director-name-display {
            font-size: 11px;
            color: #f3cf9a;
            font-weight: bold;
            margin-bottom: 10px;
            text-align: center;
            padding: 5px;
            background: #2c221b;
            border-radius: 40px;
        }

        .progress-row { display: flex; justify-content: center; margin-top: 6px; }
        .reset-btn {
            background: #4f3824;
            border: none;
            padding: 5px 16px;
            border-radius: 30px;
            color: white;
            cursor: pointer;
            font-size: 11px;
        }

        .ending-box {
            background: #221c16e0;
            backdrop-filter: blur(12px);
            border-radius: 28px;
            padding: 18px;
            text-align: center;
            margin: 14px 0;
            border: 1px solid #e5a362;
        }
        .share-hint {
            background: #2e241d;
            border-radius: 28px;
            padding: 6px 10px;
            margin-top: 10px;
            font-size: 9px;
            color: #b9a78e;
            text-align: center;
            cursor: pointer;
        }
        .badge-area { display: flex; justify-content: center; gap: 6px; margin-top: 10px; flex-wrap: wrap; }
        .ending-badge { background: #3d2c1f; padding: 3px 8px; border-radius: 30px; font-size: 9px; }

        .tab-bar {
            display: flex;
            gap: 6px;
            margin-bottom: 12px;
            border-bottom: 1px solid #36281d;
            padding-bottom: 8px;
        }
        .tab-btn {
            background: #2c221b;
            border: none;
            padding: 5px 12px;
            border-radius: 30px;
            color: #b49470;
            font-size: 10px;
            cursor: pointer;
        }
        .tab-btn.active {
            background: #5a3f2a;
            color: #f3cf9a;
        }
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }

        /* 公屏留言板 */
        .message-board {
            background: #1f1914;
            border-radius: 20px;
            padding: 10px;
            margin-bottom: 14px;
            border: 1px solid #36281d;
        }
        .board-title {
            font-size: 10px;
            color: #e2bc89;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .board-messages {
            max-height: 100px;
            overflow-y: auto;
            font-size: 9px;
            color: #b49470;
            background: #0d0b09;
            border-radius: 16px;
            padding: 6px 8px;
            margin-bottom: 8px;
        }
        .board-message {
            padding: 3px 0;
            border-bottom: 1px solid #2a241f;
            word-break: break-all;
        }
        .board-message:last-child { border-bottom: none; }
        .board-message span { color: #f3cf9a; }
        .board-input-area {
            display: flex;
            gap: 6px;
        }
        .board-input {
            flex: 1;
            background: #0f0d0b;
            border: 1px solid #6a5642;
            border-radius: 30px;
            padding: 5px 8px;
            color: #f0e2d0;
            font-size: 10px;
            outline: none;
        }
        .board-send {
            background: #4f3824;
            border: none;
            padding: 4px 12px;
            border-radius: 30px;
            color: white;
            cursor: pointer;
            font-size: 10px;
        }
        .board-clear {
            background: #3d2c1f;
            border: none;
            padding: 4px 8px;
            border-radius: 30px;
            color: #b49470;
            cursor: pointer;
            font-size: 9px;
            margin-left: 4px;
        }
    </style>
</head>
<body>
<div class="control-room" id="appRoot">
    <div class="camera-wall">
        <div class="cam-header">
            <span><span class="live-dot"></span> 锐因 不能出去的房间 · 监控中</span>
            <span>雨披导演</span>
        </div>
        <div class="danmaku-area" id="danmakuArea">
            <div class="danmaku-track" id="danmakuTrack"></div>
        </div>
        <div class="room-preview" id="roomPreview">
            <div class="characters-area">
                <div class="char-card" id="cardS">
                    <div class="char-icon" id="iconS">🦒</div>
                    <div><div class="char-name">申惟</div><div class="char-tag">SY</div></div>
                </div>
                <div class="char-card" id="cardH">
                    <div class="char-icon" id="iconH">🐰</div>
                    <div><div class="char-name">韩振</div><div class="char-tag">HJ</div></div>
                </div>
            </div>
            <div class="stats-area">
                <div class="stat-row"><div class="stat-label"><span> 申惟忍耐值</span><span id="tensionS_val">68</span><span>%</span></div><div class="stat-bar-bg"><div class="stat-bar-fill fill-s" id="tensionS_bar" style="width:68%"></div></div></div>
                <div class="stat-row"><div class="stat-label"><span> 韩振羞耻值</span><span id="tensionH_val">65</span><span>%</span></div><div class="stat-bar-bg"><div class="stat-bar-fill fill-h" id="tensionH_bar" style="width:65%"></div></div></div>
                <div class="stat-row"><div class="stat-label"><span> 逃脱进度</span><span id="escape_val">0</span><span>%</span></div><div class="stat-bar-bg"><div class="stat-bar-fill fill-escape" id="escape_bar" style="width:0%"></div></div></div>
                <div class="cmd-count-badge" id="cmdCountDisplay"> 指令: 0  |   事故: 0</div>
            </div>
        </div>
        <div class="action-log" id="actionLog"> 系统就绪。房间规则——亲密值达标才能开门。</div>
    </div>
    <div class="director-console" id="directorConsole"></div>
</div>

<script>
    (function() {
        // 状态变量
        let tensionS = 68, tensionH = 65, escape = 0, gameActive = true, ended = false;
        let logs = [], lastCommandDesc = "", cmdCount = 0, accidentCount = 0, finalEndingType = null;
        let directorName = "雨披";
        let styleStats = { soft: 0, spicy: 0, chaotic: 0 };
        let lastPhotoTime = 0;
        let shoutCallCount = 0;
        let photoCount = 0;
        let toysUsed = new Set();
        let endingTitleCache = "";
        
        // 隐藏彩蛋触发记录
        let hiddenTriggers = { sharp: false, jeju: false, num1499: false };
        
        // 结局图鉴存储
        let endingsUnlocked = JSON.parse(localStorage.getItem('ruinEndings') || '[]');
        
        // 公屏留言板存储
        let boardMessages = JSON.parse(localStorage.getItem('ruinBoardMessages') || '[]');
        
        // 结局标题池
        const titlePool = [
            "和我一起奔跑是什么心情 在这首歌结束时可以告诉我吗。",
            "要不要和我一起去往这条路的尽头。",
            "因你而改变的季节 为你而倾心的一天 我们在同一个圆里打转。",
            "今天也好 明天也罢 一起吧。",
            "被相反的人吸引的第一千万个理由。",
            "期待下一篇章的故事 人生篇章 只有第一步很难而已。",
            "曾经形单影只的我 爱上了以我们为名。"
        ];
        
        function getRandomTitle() {
            return titlePool[Math.floor(Math.random() * titlePool.length)];
        }
        
        function unlockEnding(type, displayName) {
            if (!endingsUnlocked.includes(type)) {
                endingsUnlocked.push(type);
                localStorage.setItem('ruinEndings', JSON.stringify(endingsUnlocked));
                addLog(` 图鉴解锁：${displayName}`);
            }
        }
        
        function getEndingDisplayName(type) {
            const names = {
                perfect: "降雨机率100％",
                sweet: "降雨机率90％",
                awkward: "降雨机率80％",
                long: "降雨机率70％",
                cold: "降雨机率60％",
                stuck: "降雨机率50％",
                normal: "降雪机率80％"
            };
            return names[type] || "未知结局";
        }
        
        function buildGalleryHTML() {
            const endings = [
                { id: "perfect", name: "降雨机率100％", desc: "双向奔赴" },
                { id: "sweet", name: "降雨机率90％", desc: "温柔以待" },
                { id: "awkward", name: "降雨机率80％", desc: "静水流深" },
                { id: "long", name: "降雨机率70％", desc: "日久生情" },
                { id: "cold", name: "降雨机率60％", desc: "暧昧暗涌" },
                { id: "stuck", name: "降雨机率50％", desc: "未完待续" },
                { id: "normal", name: "降雪机率80％", desc: "破冰开始" }
            ];
            let html = `<div style="display:flex;flex-direction:column;gap:8px;">`;
            endings.forEach(e => {
                let unlocked = endingsUnlocked.includes(e.id);
                let sampleTitle = unlocked ? titlePool[Math.floor(Math.random() * titlePool.length)] : "？？？";
                html += `<div style="background:#2c221b;border-radius:20px;padding:10px;border-left:3px solid ${unlocked ? '#d6955a' : '#4a3828'};">`;
                html += `<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">`;
                html += `<span style="color:#e2bc89;">${unlocked ? '🔓' : '🔒'}</span>`;
                html += `<span style="color:#f3cf9a;font-weight:bold;">${e.name}</span>`;
                html += `<span style="color:#b49470;font-size:10px;">${e.desc}</span>`;
                if (!unlocked) html += `<span style="color:#7a6856;font-size:9px;">(未解锁)</span>`;
                html += `</div>`;
                html += `<div style="color:#bfa98e;font-size:11px;margin-top:6px;font-style:italic;">“${sampleTitle}”</div>`;
                html += `</div>`;
            });
            html += `</div>`;
            return html;
        }
        
        function buildNoteHTML() {
            let style = getDirectorStyle();
            return `<pre style="white-space:pre-wrap;font-family:monospace;font-size:10px;color:#d7cdbc;line-height:1.6;">
 导演手记
━━━━━━━━━━━━━━━━
 导演: ${directorName}
 导演风格: ${style}
 拍照次数: ${photoCount}
 喊话次数: ${shoutCallCount}
 玩具使用: ${toysUsed.size}/8
 事故触发: ${accidentCount} 次
 已解锁图鉴: ${endingsUnlocked.length}/7
 隐藏彩蛋: ${Object.values(hiddenTriggers).filter(v=>v).length}/3
━━━━━━━━━━━━━━━━
            </pre>`;
        }
        
        // 公屏留言板
        function renderBoard() {
            const boardDiv = document.getElementById('boardMessages');
            if (!boardDiv) return;
            if (boardMessages.length === 0) {
                boardDiv.innerHTML = '<div style="color:#7a6856;text-align:center;padding:10px;">暂无留言，留下你的足迹吧~</div>';
                return;
            }
            let html = '';
            boardMessages.slice(-15).reverse().forEach(msg => {
                html += `<div class="board-message"><span>📢 ${msg.name}</span>：${msg.text}</div>`;
            });
            boardDiv.innerHTML = html;
        }
        
        function addBoardMessage(name, text) {
            if (!text.trim()) return;
            boardMessages.push({
                name: name.substring(0, 20),
                text: text.substring(0, 100),
                time: Date.now()
            });
            if (boardMessages.length > 100) boardMessages = boardMessages.slice(-100);
            localStorage.setItem('ruinBoardMessages', JSON.stringify(boardMessages));
            renderBoard();
            addLog(` 导演「${name}」在留言板写下了：${text.substring(0, 30)}${text.length>30?'...':''}`);
        }
        
        function clearBoard() {
            if (confirm('确定要清空所有留言吗？')) {
                boardMessages = [];
                localStorage.setItem('ruinBoardMessages', JSON.stringify(boardMessages));
                renderBoard();
                addLog(' 留言板已被清空');
            }
        }
        
        // 氛围动态效果增强
        function updateAtmosphere() {
            const preview = document.getElementById('roomPreview');
            if (preview) {
                preview.classList.remove('high-escape', 'full-escape');
                if (escape >= 85) {
                    preview.classList.add('full-escape');
                } else if (escape >= 50) {
                    preview.classList.add('high-escape');
                }
            }
            const cardS = document.getElementById('cardS');
            const cardH = document.getElementById('cardH');
            const iconS = document.getElementById('iconS');
            const iconH = document.getElementById('iconH');
            if (tensionS > 70) cardS?.classList.add('redden');
            else cardS?.classList.remove('redden');
            if (tensionH > 70) cardH?.classList.add('redden');
            else cardH?.classList.remove('redden');
            if (tensionS < 35) iconS?.classList.add('blush');
            else iconS?.classList.remove('blush');
            if (tensionH < 35) iconH?.classList.add('blush');

                case "shirt_off": deltaS=-1; deltaH=-3; deltaEsc=4+Math.floor(Math.random()*4); flavor="申惟帮韩振脱掉上衣，指尖碰到皮肤时，韩振轻轻战栗。"; break;
                case "wall_press": deltaS=-1; deltaH=-2; deltaEsc=3+Math.floor(Math.random()*3); flavor="申惟把韩振按在墙上，韩振拽住他的衣领拉近，呼吸全落在耳侧。"; break;
                case "ear_whisper_ch": deltaS=-2; deltaH=-1; deltaEsc=4+Math.floor(Math.random()*4); flavor="韩振凑过去轻声说“哥想不想更过分一点”，申惟耳朵瞬间血红。"; break;
                case "blindfold": deltaS=-4; deltaH=-1; deltaEsc=4+Math.floor(Math.random()*4); flavor="蒙住申惟眼睛，韩振用手指描摹他的脸，指尖划过嘴唇。"; break;
                case "thigh_rub": deltaS=-5; deltaH=-3; deltaEsc=4+Math.floor(Math.random()*4); flavor="韩振用大腿蹭申惟腿间，申惟抓住他的腿，想阻止，但很显然没有完全用力。"; break;
                case "back_hug_chest": deltaS=-2; deltaH=-2; deltaEsc=4+Math.floor(Math.random()*4); flavor="申惟从背后抱住韩振，手放在他胸口，韩振按住他的手不让拿开。"; break;
                case "floor_press": deltaS=-2; deltaH=-2; deltaEsc=4+Math.floor(Math.random()*4); flavor="两人滚到地板上，正对着房间内的镜子。申惟在上方俯视韩振。"; break;
                case "belt_remove": deltaS=-5; deltaH=-3; deltaEsc=4+Math.floor(Math.random()*4); flavor="韩振解开申惟的皮带，金属扣碰撞的声音格外响，申惟呼吸一滞。"; break;
                case "hand_down": deltaS=-4; deltaH=-5; deltaEsc=4+Math.floor(Math.random()*4); flavor="申惟的手从韩振腰侧滑进裤腰，韩振轻轻哼了一声。"; break;
                case "missionary": deltaS=-6; deltaH=-5; deltaEsc=5+Math.floor(Math.random()*4); flavor="申惟把韩振压在床上，膝盖顶开他双腿，韩振勾住他的脖子。"; break;
                case "spoon": deltaS=-1; deltaH=-1; deltaEsc=3+Math.floor(Math.random()*3); flavor="申惟从背后环住韩振的腰，下巴抵着他后脑勺，安静地抱了很久。"; break;
                case "teasing_deny": deltaS=-1; deltaH=-1; deltaEsc=2+Math.floor(Math.random()*3); flavor="韩振逗申惟但不让他碰，申惟急了，一把拽回来轻声说“珍珍韩振不要走”。"; break;
                case "praise_kink": deltaS=-1; deltaH=-2; deltaEsc=4+Math.floor(Math.random()*4); flavor="申惟边亲韩振边夸他“做得好”，韩振把脸埋进他胸口。"; break;
                case "hair_pull": deltaS=-2; deltaH=-1; deltaEsc=4+Math.floor(Math.random()*4); flavor="韩振揪住申惟的头发，申惟吃痛反而吻得更用力。"; break;
                case "table_edge": deltaS=-3; deltaH=-2; deltaEsc=4+Math.floor(Math.random()*4); flavor="申惟把韩振抱上书桌边缘，韩振双腿夹住他的腰。"; break;
                case "knee_ride": deltaS=-2; deltaH=-3; deltaEsc=4+Math.floor(Math.random()*4); flavor="韩振跪在床上仰头看申惟，申惟伸手把他拉起来，两人一起摔进枕头里。"; break;
                case "aftercare": deltaS=-1; deltaH=-1; deltaEsc=2+Math.floor(Math.random()*3); flavor="申惟帮韩振擦汗，轻声问他疼不疼。韩振摇头又点头，申惟亲了亲他额头。"; break;
                default: return;
            }
            
            tensionS = clampValue(tensionS + deltaS, 5, 98);
            tensionH = clampValue(tensionH + deltaH, 5, 98);
            escape = clampValue(escape + deltaEsc, 0, 100);
            
            addLog(`${transition} ${flavor} (申惟${deltaS>=0?'+':''}${deltaS}, 韩振${deltaH>=0?'+':''}${deltaH} | +${deltaEsc}%)`);
            addDanmakuForAction();
            lastCommandDesc = flavor.substring(0, 40);
            updateUI();
            
            if (cmdCount % 4 === 0 && escape < 85 && !ended) {
                let e = 2;
                escape = clampValue(escape + e, 0, 100);
                addLog(` 默契渐长，房门又松动了一些 +${e}%`);
                updateUI();
            }
            if (tensionS < 30 && tensionH < 32 && escape < 90 && !ended) {
                let e = 2;
                escape = clampValue(escape + e, 0, 100);
                addLog(` 两人不约而同看向对方，然后同时笑了。门锁咔哒 +${e}%`);
                updateUI();
            }
            
            checkAccident();
            if (escape >= 100 && !ended) checkEnding();
            updateUI();
        }

        function determineEnding() {
            if (escape >= 100) {
                if (tensionS <= 18 && tensionH <= 18) finalEndingType = "perfect";
                else if (tensionS <= 32 && tensionH <= 32) finalEndingType = "sweet";
                else if (tensionS >= 72 || tensionH >= 72) finalEndingType = "awkward";
                else if (cmdCount >= 22) finalEndingType = "long";
                else if (tensionS >= 55 && tensionH >= 55) finalEndingType = "cold";
                else finalEndingType = "normal";
            } else {
                finalEndingType = "stuck";
            }
            unlockEnding(finalEndingType, getEndingDisplayName(finalEndingType));
        }
        
        function getEndingMessage() {
            let msgMap = {
                perfect: "房门自动打开了，申惟牵着韩振的手慢慢走出来，韩振眼角有点红，他们都是笑着的。后来的舞台上、团综里，两人反而会不自觉地对视，食髓知味地想起拍电影的这一天，和那位从天而降的导演。",
                sweet: "门开了。申惟帮韩振整理衣服，韩振小声说谢谢哥。两人一前一后走出去，但申惟的手一直往后伸，直到韩振握住，他终于憋不住上扬的嘴角。原来和你牵手，是这样的感觉。",
                awkward: "门终于开了。申惟快步走在前面，韩振跟在后面低着头。回去的路上申惟帮韩振拉了拉口罩，遮住红肿的嘴唇，韩振偷偷笑了。",
                long: "经过漫长的拉扯，房门在一声轻响后打开。两人都愣住了。申惟先回过神来，把外套披在韩振身上，好像这样就能遮盖住今天暴露的所有越界的心事和秘密。",
                cold: "门开了。两人沉默着走出去，没有牵手，也没有和今天发生的事有关的任何对话。但晚上wvs直播时韩振又一次提起和申惟的初遇印象，申惟听到后耳朵红了。",
                stuck: "折腾了半天，房门纹丝不动。两人瘫坐在地上，申惟叹了口气说，这种程度还不够吗。韩振笑了，说或许吧，哥要不要试着多了解我一点。门突然响了一下，是的，也许，我们都还需要一点时间。",
                normal: "房间解锁。申惟把自己的外套紧紧裹住韩振，两人并排走出去，肩膀偶尔碰到，视线偶尔对上，他们一次都没有再躲开。"
            };
            return (msgMap[finalEndingType] || msgMap.normal) + `  (导演${directorName} · ${getDirectorStyle()})`;
        }
        
        function getDirectorStyle() {
            if (styleStats.soft > styleStats.spicy && styleStats.soft > styleStats.chaotic) return "温柔氛围感导演";
            if (styleStats.spicy > styleStats.soft && styleStats.spicy > styleStats.chaotic) return "性感直球导演";
            if (styleStats.chaotic > styleStats.soft && styleStats.chaotic > styleStats.spicy) return "混邪整活导演";
            return "平衡全能导演";
        }
        
        function checkEnding() { if (escape >= 100 && !ended) { determineEnding(); showEnding(); } }
        
        function showEnding() {
            ended = true; gameActive = false; stopDanmaku();
            const endingTitle = getRandomTitle();
            endingTitleCache = endingTitle;
            const endingMsg = getEndingMessage();
            const consoleDiv = document.getElementById('directorConsole');
            if (consoleDiv) {
                consoleDiv.innerHTML = `<div class="ending-box"><div style="font-size:40px;">🔓</div><h2 style="color:#eebb77;margin:8px 0;font-size:18px;">${endingTitle}</h2><p style="color:#efdbbc;margin:12px 0;line-height:1.45;font-size:13px;">${endingMsg}</p><div class="badge-area"><span class="ending-badge">申惟 ${Math.floor(tensionS)}%</span><span class="ending-badge">韩振 ${Math.floor(tensionH)}%</span><span class="ending-badge">指令 ${cmdCount}</span><span class="ending-badge">事故 ${accidentCount}</span></div>
                <div style="margin-top:16px;padding-top:12px;border-top:1px solid #36281d;">
                    <div style="font-size:11px;color:#e2bc89;margin-bottom:8px;">🎬 生成导演名片</div>
                    <div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;">
                        <input type="text" id="cardWorkTitleInput" placeholder="作品名" style="flex:1;background:#0f0d0b;border:1px solid #6a5642;border-radius:30px;padding:6px 12px;color:#f0e2d0;font-size:11px;outline:none;">
                        <button id="generateCardBtn" style="background:#5a3f2a;border:none;padding:6px 16px;border-radius:30px;color:white;cursor:pointer;font-size:11px;">生成名片</button>
                    </div>
                    <div id="directorCardContainer"></div>
                    <div class="share-hint" id="copyCardBtn" style="margin-top:10px;"> 复制名片文字版</div>
                </div>
                <div class="share-hint" id="copyEndingBtn" style="margin-top:10px;">点击可复制结果，游戏内容虚构，纯属娱乐。@JUN</div>
                <button class="reset-btn" id="resetEndBtn" style="background:#b46f3a;margin-top:14px;">重新开拍</button></div>`;
                
                // 绑定名片生成事件
                const generateBtn = document.getElementById('generateCardBtn');
                const copyCardBtn = document.getElementById('copyCardBtn');
                if (generateBtn) {
                    generateBtn.onclick = () => {
                        const workTitle = document.getElementById('cardWorkTitleInput')?.value || "";
                        const container = document.getElementById('directorCardContainer');
                        const style = getDirectorStyle();
                        const cardHTML = `
                            <div style="background:linear-gradient(135deg,#1a1511,#0c0a08);border-radius:20px;padding:16px;border:1px solid #d6955a;text-align:center;margin-top:8px;">
                                <div style="font-size:24px;">🎬</div>
                                <div style="font-size:14px;font-weight:bold;color:#eebb77;">气象台监控室</div>
                                <div style="font-size:10px;color:#b49470;">「锐因 不能出去的房间」</div>
                                <div style="border-top:1px solid #d6955a;margin:8px 0;"></div>
                                <div style="font-size:12px;"><span style="color:#d6955a;"> 作品名</span><br><span style="color:#d6955a;font-weight:bold;">${workTitle || "——"}</span></div>
                                <div style="border-top:1px solid #d6955a;margin:8px 0;"></div>
                                <div style="display:flex;justify-content:center;gap:16px;"><div><span style="color:#d6955a;">🦒</span><br><span style="font-size:11px;">申惟</span></div><div><span style="color:#d6955a;">🐰</span><br><span style="font-size:11px;">韩振</span></div></div>
                                <div style="border-top:1px solid #d6955a;margin:8px 0;"></div>
                                <div style="font-size:10px;text-align:left;padding:4px;">
                                    <div style="color:#ffffff;"> 导演 ${directorName}</div>
                                    <div style="color:#ffffff;"> 风格 ${style}</div>
                                    <div style="color:#ffffff;"> 结局 ${endingTitle.substring(0,18)}...</div>
                                    <div style="color:#ffffff;"> 申惟${Math.floor(tensionS)}% 韩振${Math.floor(tensionH)}%</div>
                                    <div style="color:#ffffff;"> 指令 ${cmdCount}次  拍照${photoCount}次</div>
                                </div>
                                <div style="font-size:8px;color:#7a6856;margin-top:6px;">雨披导演工作室 · 锐因房间监控室</div>
                            </div>
                        `;
                        container.innerHTML = cardHTML;
                    };
                }
                if (copyCardBtn) {
                    copyCardBtn.onclick = () => {
                        const workTitle = document.getElementById('cardWorkTitleInput')?.value || "";
                        const style = getDirectorStyle();
                        const cardText = `【小雨披大导演】\n作品名：${workTitle || "——"}\n导演：${directorName}\n风格：${style}\n主演：申惟 · 韩振\n结局：${endingTitle}\n数据：申惟${Math.floor(tensionS)}% 韩振${Math.floor(tensionH)}%\n指令${cmdCount}次 拍照${photoCount}次\n#锐因 #小雨披大导演`;
                        navigator.clipboard.writeText(cardText).then(() => {
                            copyCardBtn.innerText = "✓ 已复制！";
                            setTimeout(() => { copyCardBtn.innerText = " 复制名片文字版"; }, 2000);
                        });
                    };
                }
                
                const resetBtn = document.getElementById('resetEndBtn');
                const copyBtn = document.getElementById('copyEndingBtn');
                if (resetBtn) resetBtn.addEventListener('click', resetGame);
                if (copyBtn) copyBtn.addEventListener('click', () => {
                    navigator.clipboard.writeText(`【小雨披大导演】${directorName}导演 · ${getDirectorStyle()}\n结局: ${endingTitle}\n${endingMsg}\n申惟${Math.floor(tensionS)}% 韩振${Math.floor(tensionH)}% 指令${cmdCount}次 事故${accidentCount}次`).then(() => {
                        copyBtn.innerText = "✓ 已复制！";
                        setTimeout(() => { copyBtn.innerText = "点击可复制结果，游戏内容虚构，纯属娱乐。@JUN"; }, 2000);
                    });
                });
            }
        }
        
        function resetGame() {
            tensionS = 68; tensionH = 65; escape = 0; gameActive = true; ended = false;
            logs = []; lastCommandDesc = ""; cmdCount = 0; accidentCount = 0; finalEndingType = null;
            styleStats = { soft: 0, spicy: 0, chaotic: 0 };
            shoutCallCount = 0; lastPhotoTime = 0; photoCount = 0; toysUsed.clear();
            hiddenTriggers = { sharp: false, jeju: false, num1499: false };
            stopDanmaku();
            rebuildConsole();
            updateUI();
            startDanmaku();
            addLog(" 系统重置完毕，重新开拍。");
        }
        
        function rebuildConsole() {
            const consoleDiv = document.getElementById('directorConsole');
            if (!consoleDiv) return;
            consoleDiv.innerHTML = `
                <div class="director-name-display" id="directorNameDisplay">🎬 ${directorName}导演</div>
                <div class="name-input-area"><span class="name-label">导演署名</span><input type="text" class="name-input" id="directorNameInput" placeholder="输入你的名字" value="${directorName}"><button class="name-confirm" id="confirmNameBtn">确认</button></div>
                <div class="tab-bar"><button class="tab-btn active" data-tab="main" onclick="switchTab('main')"> 游戏</button><button class="tab-btn" data-tab="gallery" onclick="switchTab('gallery')"> 图鉴</button><button class="tab-btn" data-tab="note" onclick="switchTab('note')"> 手记</button><button class="tab-btn" data-tab="board" onclick="switchTab('board')"> 留言板</button></div>
                <div id="tabMain" class="tab-content active"><div class="section-title">🎙️ 指令台</div><div class="command-grid" id="commandGrid"></div><div class="toy-section"><div class="toy-title">导演道具</div><div class="toy-grid" id="toyGrid"></div></div><div class="director-interact"><div class="talk-label">🎙️ 导演工具箱</div><div class="interact-buttons"><button class="interact-btn" id="musicBtn">音乐</button><button class="interact-btn" id="lightBtn">调光</button><button class="interact-btn" id="coffeeBtn">饮料</button><button class="interact-btn" id="snackBtn">零食</button><button class="photo-btn" id="photoBtn"> 拍照</button></div><div class="talk-input-area"><input type="text" class="talk-input" id="directorTalkInput" placeholder="喊话，比如: 再主动一点" autocomplete="off"><button class="send-btn" id="sendTalkBtn">喊话</button></div></div><div class="progress-row"><button class="reset-btn" id="resetGameBtn">🎞️ 重新开拍</button></div></div>
                <div id="tabGallery" class="tab-content"><div class="section-title"> 结局图鉴</div><div id="galleryInner"></div></div>
                <div id="tabNote" class="tab-content"><div class="section-title"> 导演手记</div><div id="noteInner"></div></div>
                <div id="tabBoard" class="tab-content"><div class="section-title"> 公屏留言板</div><div class="message-board"><div class="board-title"> 所有导演的足迹</div><div class="board-messages" id="boardMessages"></div><div class="board-input-area"><input type="text" class="board-input" id="boardInput" placeholder="留下你的话，其他导演也能看到..." maxlength="100"><button class="board-send" id="boardSendBtn">留言</button><button class="board-clear" id="boardClearBtn">清空</button></div></div></div>
            `;
            window.switchTab = function(tab) {
                document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
                document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
                if (tab === 'main') {
                    document.getElementById('tabMain')?.classList.add('active');
                    document.querySelector('.tab-btn[data-tab="main"]')?.classList.add('active');
                } else if (tab === 'gallery') {
                    document.getElementById('tabGallery')?.classList.add('active');
                    document.querySelector('.tab-btn[data-tab="gallery"]')?.classList.add('active');
                    const galleryDiv = document.getElementById('galleryInner');
                    if (galleryDiv) galleryDiv.innerHTML = buildGalleryHTML();
                } else if (tab === 'note') {
                    document.getElementById('tabNote')?.classList.add('active');
                    document.querySelector('.tab-btn[data-tab="note"]')?.classList.add('active');
                    const noteDiv = document.getElementById('noteInner');
                    if (noteDiv) noteDiv.innerHTML = buildNoteHTML();
                } else if (tab === 'board') {
                    document.getElementById('tabBoard')?.classList.add('active');
                    document.querySelector('.tab-btn[data-tab="board"]')?.classList.add('active');
                    renderBoard();
                }
            };
            
            document.getElementById('confirmNameBtn')?.addEventListener('click', () => {
                let nn = document.getElementById('directorNameInput')?.value.trim();
                if (nn) directorName = nn;
                const dd = document.getElementById('directorNameDisplay');
                if (dd) dd.innerText = `🎬 ${directorName}导演`;
                addLog(`「${directorName}」导演已就位。`);
            });
            
            const grid = document.getElementById('commandGrid');
            if (grid) {
                grid.innerHTML = "";
                actionCommands.forEach(act => {
                    let btn = document.createElement('button');
                    btn.className = "cmd-btn";
                    btn.innerText = act.label;
                    btn.onclick = () => executeCommand(act.id);
                    grid.appendChild(btn);
                });
            }
            
            const toyGrid = document.getElementById('toyGrid');
            if (toyGrid) {
                toyGrid.innerHTML = "";
                toys.forEach(toy => {
                    let btn = document.createElement('button');
                    btn.className = "toy-btn";
                    btn.innerText = toy.label;
                    btn.onclick = () => useToy(toy.id);
                    toyGrid.appendChild(btn);
                });
            }
            
            document.getElementById('musicBtn')?.addEventListener('click', () => directorAction('music'));
            document.getElementById('lightBtn')?.addEventListener('click', () => directorAction('light'));
            document.getElementById('coffeeBtn')?.addEventListener('click', () => directorAction('coffee'));
            document.getElementById('snackBtn')?.addEventListener('click', () => directorAction('snack'));
            document.getElementById('photoBtn')?.addEventListener('click', takePhoto);
            
            const sendBtn = document.getElementById('sendTalkBtn');
            const talkInp = document.getElementById('directorTalkInput');
            if (sendBtn && talkInp) {
                sendBtn.onclick = () => { if (talkInp.value.trim()) directorAction('shout', talkInp.value.trim()); talkInp.value = ''; };
                talkInp.addEventListener('keypress', (e) => { if (e.key === 'Enter') { if (talkInp.value.trim()) directorAction('shout', talkInp.value.trim()); talkInp.value = ''; } });
            }
            document.getElementById('resetGameBtn')?.addEventListener('click', resetGame);
            
            // 留言板事件
            const boardInput = document.getElementById('boardInput');
            const boardSendBtn = document.getElementById('boardSendBtn');
            const boardClearBtn = document.getElementById('boardClearBtn');
            if (boardSendBtn && boardInput) {
                boardSendBtn.onclick = () => {
                    let msg = boardInput.value.trim();
                    if (msg) {
                        addBoardMessage(directorName, msg);
                        boardInput.value = '';
                    }
                };
                boardInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') { let msg = boardInput.value.trim(); if (msg) { addBoardMessage(directorName, msg); boardInput.value = ''; } } });
            }
            if (boardClearBtn) boardClearBtn.onclick = () => clearBoard();
            
            const galleryDiv = document.getElementById('galleryInner');
            if (galleryDiv) galleryDiv.innerHTML = buildGalleryHTML();
            const noteDiv = document.getElementById('noteInner');
            if (noteDiv) noteDiv.innerHTML = buildNoteHTML();
            renderBoard();
        }
        
        function init() {
            rebuildConsole();
            updateUI();
            startDanmaku();
            addLog(" 房间规则——亲密值达标才能开门。");
        }
        init();
    })();
</script>
</body>
</html>
