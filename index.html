<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>小雨披大导演 · 锐因 不能出去的房间</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #0a0705;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: system-ui, -apple-system, 'Segoe UI', 'Helvetica Neue', sans-serif;
            padding: 12px;
        }

        .control-room {
            max-width: 500px;
            width: 100%;
            margin: 0 auto;
            background: #11100e;
            border-radius: 44px;
            box-shadow: 0 30px 50px rgba(0,0,0,0.6), 0 0 0 1px #4a3524 inset;
            overflow: hidden;
        }

        .camera-wall {
            background: #050403;
            padding: 18px 20px 12px;
            border-bottom: 2px solid #b87c4a;
        }

        .cam-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
            color: #bfa98e;
            font-size: 11px;
            letter-spacing: 0.5px;
        }

        .live-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #e34d4d;
            border-radius: 50%;
            box-shadow: 0 0 6px red;
            margin-right: 6px;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.4; transform: scale(0.8);}
            100% { opacity: 1; transform: scale(1);}
        }

        .room-preview {
            background: #0c0a08;
            border-radius: 28px;
            padding: 16px;
            border: 1px solid #36281d;
        }

        .characters-area {
            display: flex;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
            margin-bottom: 16px;
        }

        .char-card {
            background: #201a14;
            border-radius: 50px;
            padding: 8px 18px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 4px 0 #0b0805;
            border-bottom: 2px solid #d6955a;
        }

        .char-icon {
            width: 44px;
            height: 44px;
            background: #3f2c1d;
            border-radius: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
        }

        .char-name {
            color: #f3cf9a;
            font-weight: bold;
            font-size: 16px;
        }

        .char-tag {
            font-size: 10px;
            color: #b49470;
        }

        .stats-area {
            background: #1f1914;
            border-radius: 24px;
            padding: 12px 16px;
            margin-top: 12px;
        }

        .stat-row {
            margin-bottom: 10px;
        }

        .stat-label {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            color: #e2bc89;
            margin-bottom: 4px;
        }

        .stat-bar-bg {
            background: #2a241f;
            height: 8px;
            border-radius: 10px;
            overflow: hidden;
        }

        .stat-bar-fill {
            height: 100%;
            border-radius: 10px;
            transition: width 0.2s;
        }

        .fill-s { background: #d97838; }
        .fill-h { background: #c96f5e; }
        .fill-escape { background: #4c9f70; }

        .stat-value {
            font-family: monospace;
            font-weight: bold;
        }

        .cmd-count-badge {
            background: #2c241e;
            display: inline-block;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 10px;
            margin-top: 6px;
        }

        .action-log {
            background: #0d0b09;
            margin: 14px 16px 16px 16px;
            border-radius: 20px;
            padding: 12px 14px;
            color: #d7cdbc;
            font-size: 11px;
            font-family: monospace;
            border-left: 4px solid #d78c45;
            min-height: 130px;
            max-height: 160px;
            overflow-y: auto;
        }

        .director-console {
            background: #1a1511;
            padding: 16px 18px 22px;
        }

        .section-title {
            font-size: 16px;
            font-weight: bold;
            color: #e7bc82;
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            border-left: 3px solid #e2a15b;
            padding-left: 12px;
        }

        .command-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 20px;
            max-height: 260px;
            overflow-y: auto;
            padding-bottom: 6px;
        }

        .cmd-btn {
            background: #2c221b;
            border: 1px solid #745d45;
            color: #ffefdb;
            padding: 8px 12px;
            border-radius: 40px;
            font-family: monospace;
            font-weight: bold;
            font-size: 11px;
            cursor: pointer;
            flex: 1 0 auto;
            min-width: 70px;
            text-align: center;
            transition: 0.05s linear;
        }

        .cmd-btn:active {
            background: #4e3725;
            transform: scale(0.96);
        }

        .director-interact {
            background: #2a221c;
            border-radius: 24px;
            padding: 14px;
            margin-bottom: 18px;
            border: 1px solid #594f43;
        }

        .talk-label {
            font-size: 11px;
            color: #e2bc89;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .interact-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 14px;
        }

        .interact-btn {
            background: #3d2c1f;
            border: none;
            padding: 7px 12px;
            border-radius: 30px;
            color: #f0cfaa;
            font-size: 11px;
            cursor: pointer;
            font-family: monospace;
        }

        .interact-btn:active {
            background: #5e402c;
        }

        .talk-input-area {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .talk-input {
            flex: 1;
            background: #1a1511;
            border: 1px solid #6a5642;
            border-radius: 40px;
            padding: 8px 14px;
            color: #f0e2d0;
            font-family: monospace;
            font-size: 12px;
            outline: none;
        }

        .send-btn {
            background: #4f3824;
            border: none;
            padding: 6px 16px;
            border-radius: 40px;
            color: white;
            cursor: pointer;
            font-family: monospace;
            font-weight: bold;
            font-size: 12px;
        }

        .name-input-area {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            background: #1f1914;
            padding: 10px 12px;
            border-radius: 40px;
            align-items: center;
            flex-wrap: wrap;
        }
        .name-label {
            font-size: 12px;
            color: #e2bc89;
        }
        .name-input {
            flex: 1;
            background: #0f0d0b;
            border: 1px solid #6a5642;
            border-radius: 40px;
            padding: 8px 14px;
            color: #f0e2d0;
            font-size: 13px;
            outline: none;
        }
        .name-confirm {
            background: #5a3f2a;
            border: none;
            padding: 6px 16px;
            border-radius: 40px;
            color: white;
            cursor: pointer;
            font-size: 12px;
        }
        .director-name-display {
            font-size: 13px;
            color: #f3cf9a;
            font-weight: bold;
            margin-bottom: 12px;
            text-align: center;
            padding: 6px;
            background: #2c221b;
            border-radius: 40px;
        }

        .progress-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            margin-top: 6px;
        }

        .reset-btn {
            background: #4f3824;
            border: none;
            padding: 6px 16px;
            border-radius: 30px;
            color: white;
            cursor: pointer;
            font-family: monospace;
            font-size: 12px;
        }

        .ending-box {
            background: #221c16e0;
            backdrop-filter: blur(12px);
            border-radius: 32px;
            padding: 22px;
            text-align: center;
            margin: 16px 0;
            border: 1px solid #e5a362;
        }

        .share-hint {
            background: #2e241d;
            border-radius: 28px;
            padding: 8px 14px;
            margin-top: 14px;
            font-size: 10px;
            color: #b9a78e;
            text-align: center;
            cursor: pointer;
        }

        .badge-area {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 12px;
            flex-wrap: wrap;
        }

        .ending-badge {
            background: #3d2c1f;
            padding: 4px 10px;
            border-radius: 30px;
            font-size: 10px;
        }
    </style>
</head>
<body>
<div class="control-room" id="appRoot">
    <div class="camera-wall">
        <div class="cam-header">
            <span><span class="live-dot"></span> 锐因 不能出去的房间 · 监控中</span>
            <span>雨披导演</span>
        </div>
        <div class="room-preview">
            <div class="characters-area">
                <div class="char-card">
                    <div class="char-icon">🦒</div>
                    <div><div class="char-name">申惟</div><div class="char-tag">SY</div></div>
                </div>
                <div class="char-card">
                    <div class="char-icon">🐰</div>
                    <div><div class="char-name">韩振</div><div class="char-tag">HJ</div></div>
                </div>
            </div>
            
            <div class="stats-area">
                <div class="stat-row">
                    <div class="stat-label"><span>🔥 申惟忍耐值</span><span id="tensionS_val" class="stat-value">68</span><span>%</span></div>
                    <div class="stat-bar-bg"><div class="stat-bar-fill fill-s" id="tensionS_bar" style="width:68%"></div></div>
                </div>
                <div class="stat-row">
                    <div class="stat-label"><span>💗 韩振羞耻值</span><span id="tensionH_val" class="stat-value">65</span><span>%</span></div>
                    <div class="stat-bar-bg"><div class="stat-bar-fill fill-h" id="tensionH_bar" style="width:65%"></div></div>
                </div>
                <div class="stat-row">
                    <div class="stat-label"><span>🔓 逃脱进度</span><span id="escape_val" class="stat-value">0</span><span>%</span></div>
                    <div class="stat-bar-bg"><div class="stat-bar-fill fill-escape" id="escape_bar" style="width:0%"></div></div>
                </div>
                <div class="cmd-count-badge" id="cmdCountDisplay"> 指令: 0  |   事故: 0</div>
            </div>
        </div>
        <div class="action-log" id="actionLog">
            📼 系统就绪。房间规则——亲密值达标才能开门。
        </div>
    </div>
    <div class="director-console" id="directorConsole"></div>
</div>

<script>
    (function() {
        // 状态变量
        let tensionS = 68;
        let tensionH = 65;
        let escape = 0;
        let gameActive = true;
        let ended = false;
        let logs = [];
        let lastCommandDesc = "";
        let cmdCount = 0;
        let accidentCount = 0;
        let finalEndingType = null;
        
        // 导演信息
        let directorName = "雨披";
        let directorStyle = "未定义";
        
        // 用于统计风格（均衡权重）
        let styleStats = { soft: 0, spicy: 0, chaotic: 0 };
        
        // ==================== 逃脱进度递进描述库 ====================
        const escapePhrases = {
            veryLow: [
                "门锁发出细微的咔哒声，好像有什么在松动。",
                "门缝里透进来一丝微弱的光，又松动了一点。",
                "空气里有细微的变化，锁芯轻轻转了一下。",
                "门框发出轻微的吱呀声，两人同时看了一眼房门。"
            ],
            low: [
                "锁芯又转动了一格，离门开更近了。",
                "门缝比之前宽了一点点，透进的光更多了。",
                "房门周围的墙皮掉了一小块，进度在往前推。",
                "申惟的余光扫到门缝，似乎比之前宽了。"
            ],
            medium: [
                "门锁弹开了一道卡扣，两人呼吸都变轻了。",
                "房间里的压迫感减弱了一些，门已经开始晃动。",
                "逃脱的希望明显增长了，门板发出沉闷的一声响。",
                "韩振感觉到门缝吹进来的风，小声说“快了吗”。"
            ],
            high: [
                "门已经半开，外面透进来的光线落在两人身上。",
                "锁舌完全缩回，只要再轻轻一推就能打开。",
                "申惟伸手碰了碰门，回头看了韩振一眼。",
                "门把手上结的霜化了，金属变得温热。"
            ],
            almost: [
                "咔哒一声，门锁彻底弹开！只剩下最后一点合页。",
                "房门已经摇摇欲坠，只差最后一点点力气。",
                "两人对视一眼，同时把手放在了门把手上。",
                "门开了一条手臂宽的缝，外面自由的空气涌了进来。"
            ]
        };
        
        function getEscapePhrase(progress) {
            let arr;
            if (progress < 16) arr = escapePhrases.veryLow;
            else if (progress < 36) arr = escapePhrases.low;
            else if (progress < 61) arr = escapePhrases.medium;
            else if (progress < 86) arr = escapePhrases.high;
            else arr = escapePhrases.almost;
            return arr[Math.floor(Math.random() * arr.length)];
        }
        
        // ==================== 丰富的喊话触发词库 (基于锐因相处模式扩充至80+条) ====================
        const triggerWords = [
            // === 亲密/主动类 (加 spicy，权重降低) ===
            { keywords: ["亲","吻","嘴一个","kiss","亲亲"], effect: { ts: -3, th: -2, esc: 0, style: "spicy", log: "  两人耳尖泛红，气氛开始发烫。" } },
            { keywords: ["抱","搂","hug","拥抱"], effect: { ts: -2, th: -3, esc: 0, style: "soft", log: "  韩振主动张开手臂，申惟犹豫了一下圈住了他。" } },
            { keywords: ["牵手","拉手","十指紧扣","握"], effect: { ts: -2, th: -2, esc: 1, style: "soft", log: "  两个人指尖碰到一起，又赶紧分开，最后还是握住了。" } },
            { keywords: ["对视","看对方","眼神","eye contact"], effect: { ts: -3, th: -3, esc: 2, style: "soft", log: "  四目相对的瞬间，申惟先移开又忍不住看回去。" } },
            { keywords: ["撒娇","卖萌","可爱","kiyo","饺子"], effect: { ts: -1, th: -4, esc: 1, style: "soft", log: "  韩振故意用中文撒娇，申惟耳朵红透了。" } },
            { keywords: ["告白","表白","喜欢","爱你","撒浪嘿","我爱你"], effect: { ts: -4, th: -5, esc: 3, style: "spicy", log: "  房间里突然安静，申惟低下头耳朵红得像要滴血。" } },
            { keywords: ["摸头","揉头发","顺毛"], effect: { ts: -2, th: -2, esc: 1, style: "soft", log: "  申惟抬手轻轻揉了揉韩振的头发，韩振眯起眼睛。" } },
            { keywords: ["搂腰","腰"], effect: { ts: -3, th: -3, esc: 2, style: "spicy", log: "  申惟的手搭在韩振腰侧，没有要拿开的意思。" } },
            { keywords: ["摸脸","捧脸"], effect: { ts: -3, th: -3, esc: 2, style: "spicy", log: "  韩振捧住申惟的脸，拇指轻轻蹭过他的颧骨。" } },
            // === 锐因专属梗（柔和类加 soft）===
            { keywords: ["躲","躲闪","转头","别躲","逃避","条件反射"], effect: { ts: -3, th: 0, esc: 2, style: "chaotic", log: "  申惟听到后深吸一口气，强迫自己没往后躲，韩振愣了一下。" } },
            { keywords: ["锐化","角雕","小号","匿名","锐化的原因"], effect: { ts: -4, th: -3, esc: 3, style: "soft", log: "  韩振突然提起出道前的事，申惟一脸懵，气氛反而轻松了。" } },
            { keywords: ["济州岛","一起去","旅行","jeju"], effect: { ts: -3, th: -3, esc: 2, style: "soft", log: "  申惟小声说“等出去以后”，韩振眼睛亮了。" } },
            { keywords: ["鱼","自行车","鱼和自行车"], effect: { ts: -2, th: -2, esc: 2, style: "chaotic", log: "  两人被这个比喻逗笑了，气氛破冰。" } },
            { keywords: ["信息差","异国","绿卡"], effect: { ts: -2, th: -2, esc: 1, style: "soft", log: "  韩振用中文说了句什么，申惟没听懂但跟着笑了。" } },
            // === 韩语/中文教学类（加 soft）===
            { keywords: ["韩语","教韩语","韩文"], effect: { ts: -2, th: -2, esc: 2, style: "soft", log: "  韩振小声教了一句韩语，申惟跟着念完两人都笑了。" } },
            { keywords: ["中文","说中文","普通话"], effect: { ts: -2, th: -2, esc: 2, style: "soft", log: "  申惟用蹩脚的中文说了句“我爱你”，韩振笑弯了腰。" } },
            { keywords: ["我爱你韩语","사랑해","撒浪嘿"], effect: { ts: -3, th: -3, esc: 2, style: "soft", log: "  申惟学着说了一句，韩振突然安静了。" } },
            { keywords: ["老婆","老公","亲爱的"], effect: { ts: -3, th: -4, esc: 2, style: "spicy", log: "  申惟跟着韩振学了这个词，说完两个人都不好意思了。" } },
            // === 推拉/暧昧类（加 chaotic）===
            { keywords: ["推拉","拉扯","若即若离"], effect: { ts: -2, th: -2, esc: 1, style: "chaotic", log: "  两个人一个进一个退，像跳双人舞一样。" } },
            { keywords: ["不熟","尴尬","别扭","难亲近"], effect: { ts: 4, th: 3, esc: 0, style: "chaotic", log: "  提到这个，两人反而更不自在了，空气凝固了几秒。" } },
            { keywords: ["前任","旧情","过去"], effect: { ts: 3, th: 2, esc: 0, style: "chaotic", log: "  申惟摇摇头，韩振低头笑了笑，没有追问。" } },
            { keywords: ["纯恨","恨","讨厌"], effect: { ts: 5, th: 4, esc: -1, style: "chaotic", log: "  两人同时否认，但否认得太快反而显得奇怪。" } },
            // === 催促/进度类（加 chaotic）===
            { keywords: ["快","速度","加速","快点","赶紧","抓紧"], effect: { ts: 0, th: 0, esc: 3, style: "chaotic", log: "  导演的催促让两人手忙脚乱，反而碰出了更多火花。" } },
            { keywords: ["磨蹭","别磨蹭","效率","太慢"], effect: { ts: 1, th: 1, esc: 2, style: "chaotic", log: "  两人被催得有点紧张，但肢体接触却更自然了。" } },
            // === 鼓励/温柔类（加 soft）===
            { keywords: ["加油","努力","fighting","你可以的"], effect: { ts: -2, th: -1, esc: 2, style: "soft", log: "  导演的鼓励让两人相视一笑，紧张感减少了许多。" } },
            { keywords: ["别紧张","放松","take it easy","没事"], effect: { ts: -3, th: -2, esc: 1, style: "soft", log: "  申惟做了个深呼吸，肩膀松了下来。" } },
            // === 互动/靠近类（spicy 和 soft 均衡）===
            { keywords: ["靠近","再近一点","贴近","距离"], effect: { ts: -3, th: -2, esc: 2, style: "spicy", log: "  两人之间的距离缩短到只剩一拳，呼吸声清晰可闻。" } },
            { keywords: ["叫名字","申惟","韩振","全名"], effect: { ts: -2, th: -1, esc: 1, style: "soft", log: "  韩振用中文喊了申惟的全名，申惟愣了一下。" } },
            { keywords: ["哥哥","欧巴","hiong","弟弟",], effect: { ts: -1, th: -2, esc: 1, style: "soft", log: "  韩振乖巧地喊了一声“hiong”，申惟的耳朵又红了。" } },
            // === 氛围/环境类（加 soft）===
            { keywords: ["音乐","放歌","bgm","旋律"], effect: { ts: -2, th: -2, esc: 1, style: "soft", log: "  不知道哪里传来的旋律，两人更放松了一点。" } },
            { keywords: ["灯光","调暗","暗一点","黑暗"], effect: { ts: -1, th: -3, esc: 1, style: "soft", log: "  昏暗的光线下，两人反而比从前更敢看向对方。" } },

        function processShout(text) {
            let lower = text.toLowerCase();
            let matched = null;
            for (let w of triggerWords) {
                for (let kw of w.keywords) {
                    if (lower.includes(kw.toLowerCase())) {
                        matched = w;
                        break;
                    }
                }
                if (matched) break;
            }
            if (!matched) {
                addLog(`【${directorName}导演喊话】“${text}”`);
                addLog(`  导演的话在房间里回荡，两人沉默了几秒。`);
                return;
            }
            
            let eff = matched.effect;
            tensionS = Math.max(10, Math.min(98, tensionS + eff.ts));
            tensionH = Math.max(10, Math.min(98, tensionH + eff.th));
            let escInc = eff.esc + Math.floor(Math.random() * 3);
            escape = Math.min(100, escape + escInc);
            
            addLog(`【${directorName}导演喊话】“${text}”`);
            addLog(matched.log);
            if (eff.style && styleStats[eff.style] !== undefined) styleStats[eff.style]++;
            
            if (escInc > 0) {
                let phrase = getEscapePhrase(escape);
                addLog(`  🔓 ${phrase} (+${escInc}%)`);
            } else if (escInc === 0) {
                addLog(`  导演的话在房间里激起一阵微妙的波动。`);
            } else {
                addLog(`  ⚠️ 气氛似乎变得更紧绷了。`);
            }
            updateUI();
            checkAccident();
            if (escape >= 100 && !ended) checkEnding();
        }
        
        function updateUI() {
            document.getElementById('tensionS_val') && (document.getElementById('tensionS_val').innerText = Math.floor(tensionS));
            document.getElementById('tensionH_val') && (document.getElementById('tensionH_val').innerText = Math.floor(tensionH));
            document.getElementById('escape_val') && (document.getElementById('escape_val').innerText = Math.floor(escape));
            document.getElementById('tensionS_bar') && (document.getElementById('tensionS_bar').style.width = Math.min(100, tensionS) + '%');
            document.getElementById('tensionH_bar') && (document.getElementById('tensionH_bar').style.width = Math.min(100, tensionH) + '%');
            document.getElementById('escape_bar') && (document.getElementById('escape_bar').style.width = Math.min(100, escape) + '%');
            document.getElementById('cmdCountDisplay') && (document.getElementById('cmdCountDisplay').innerText = `🎬 指令: ${cmdCount}  |  💥 事故: ${accidentCount}`);
        }

        function addLog(msg) {
            logs.unshift(msg);
            if(logs.length > 12) logs.pop();
            const logDiv = document.getElementById('actionLog');
            if(logDiv) {
                logDiv.innerHTML = logs.map((l, i) => (i === 0 ? "🎬 " : "&nbsp;&nbsp;") + l).join('<br>');
            }
        }
        
        // 风格显示只在结局调用，过程中不显示
        function getDirectorStyleForEnding() {
            if(styleStats.soft > styleStats.spicy && styleStats.soft > styleStats.chaotic) return "温柔派 · 氛围感导演";
            else if(styleStats.spicy > styleStats.soft && styleStats.spicy > styleStats.chaotic) return "性感派 · 直球导演";
            else if(styleStats.chaotic > styleStats.soft && styleStats.chaotic > styleStats.spicy) return "混邪派 · 整活导演";
            else return "平衡派 · 全能导演";
        }
        
        // 调整指令的风格权重，让 spicy 不再过度集中
        function recordStyle(cmdId) {
            if(cmdId === "aftercare" || cmdId === "spoon" || cmdId === "praise_kink") styleStats.soft += 2;
            else if(cmdId === "teasing_deny" || cmdId === "hair_pull") styleStats.chaotic += 2;
            else if(cmdId === "kiss_deep" || cmdId === "neck_bite") styleStats.spicy += 1;
            else if(cmdId === "lap_grind" || cmdId === "thigh_rub") styleStats.spicy += 1;
            else if(cmdId === "belt_remove" || cmdId === "hand_down" || cmdId === "missionary") styleStats.spicy += 1;
            else if(cmdId === "ear_whisper_ch" || cmdId === "wall_press" || cmdId === "back_hug_chest") styleStats.spicy += 1;
            else if(cmdId === "floor_press" || cmdId === "table_edge" || cmdId === "knee_ride") styleStats.spicy += 1;
            else if(cmdId === "shirt_off" || cmdId === "blindfold") styleStats.spicy += 1;
            else { 
                // 其他指令随机分配，使风格更均衡
                let rand = Math.random();
                if (rand < 0.4) styleStats.soft += 1;
                else if (rand < 0.7) styleStats.spicy += 1;
                else styleStats.chaotic += 1;
            }
        }

        function checkAccident() {
            if(ended || escape >= 100) return false;
            if(cmdCount > 6 && escape < 25 && tensionS > 62 && tensionH > 62 && accidentCount < 2) {
                accidentCount++;
                let accidentMsg = "";
                let rand = Math.floor(Math.random() * 4);
                if(rand === 0) accidentMsg = "申惟太紧张撞到了桌角，气氛更僵了 (紧张值+5)";

                else accidentMsg = "韩振不小心把水打翻在申惟身上，手忙脚乱更尴尬了";
                tensionS = Math.min(95, tensionS + 5);
                tensionH = Math.min(95, tensionH + 4);
                addLog(accidentMsg);
                updateUI();
                return true;
            }
            if(cmdCount > 4 && tensionS > 74 && Math.random() < 0.18 && accidentCount < 2) {
                accidentCount++;
                addLog("申惟顶不住压力，躲到角落背对着韩振。韩振站在原地不知所措。");

        function determineEnding() {
            if(escape >= 100) {
                if(tensionS <= 25 && tensionH <= 28) finalEndingType = "perfect";

                else if(tensionS >= 65 || tensionH >= 68) finalEndingType = "awkward";
                else if(cmdCount >= 18) finalEndingType = "long";
                else if(tensionS >= 50 && tensionH >= 50) finalEndingType = "cold";
                else finalEndingType = "normal";

            const title = getEndingTitle();
            const msg = getEndingMessage();
            const consoleDiv = document.getElementById('directorConsole');
            if(consoleDiv) {
                consoleDiv.innerHTML = `
                    <div class="ending-box">
                        <div style="font-size: 40px;">🔓</div>
                        <h2 style="color:#eebb77; margin: 8px 0; font-size: 18px;">${title}</h2>
                        <p style="color:#efdbbc; margin: 12px 0; line-height:1.45; font-size: 13px;">${msg}</p>
                        <div class="badge-area">
                            <span class="ending-badge">申惟 ${Math.floor(tensionS)}%</span>
                            <span class="ending-badge">韩振 ${Math.floor(tensionH)}%</span>
                            <span class="ending-badge">指令 ${cmdCount}</span>
                            <span class="ending-badge">事故 ${accidentCount}</span>
                        </div>
                        <div class="share-hint" id="copyEndingBtn">点击可复制结果，游戏内容虚构，纯属娱乐。@JUN </div>
                        <button class="reset-btn" id="resetEndBtn" style="background:#b46f3a; margin-top:14px;">重新开拍</button>
                    </div>
                `;
                const resetBtn = document.getElementById('resetEndBtn');
                const copyBtn = document.getElementById('copyEndingBtn');
                if(resetBtn) resetBtn.addEventListener('click', resetGame);
                if(copyBtn) {
                    copyBtn.addEventListener('click', () => {
                        const shareText = `【小雨披大导演】${directorName}导演 · ${getDirectorStyleForEnding()}\n结局: ${title}\n${msg}\n申惟${Math.floor(tensionS)}% 韩振${Math.floor(tensionH)}% 指令${cmdCount}次 事故${accidentCount}次`;
                        navigator.clipboard.writeText(shareText).then(() => {
                            copyBtn.innerText = "✓ 已复制！";
                            setTimeout(() => { copyBtn.innerText = "点击可复制结果，游戏内容虚构，纯属娱乐。@JUN "; }, 2000);
                        });
                    });
                }
            }
        }

        function resetGame() {
            tensionS = 68;
            tensionH = 65;
            escape = 0;
            gameActive = true;
            ended = false;
            logs = [];
            lastCommandDesc = "";
            cmdCount = 0;
            accidentCount = 0;
            finalEndingType = null;
            styleStats = { soft: 0, spicy: 0, chaotic: 0 };
            
            const consoleDiv = document.getElementById('directorConsole');
            if(consoleDiv) {
                consoleDiv.innerHTML = `
                    <div class="director-name-display" id="directorNameDisplay">🎬 ${directorName}导演 · 未定义风格</div>
                    <div class="name-input-area">
                        <span class="name-label">导演署名</span>
                        <input type="text" class="name-input" id="directorNameInput" placeholder="输入你的名字" value="${directorName}">
                        <button class="name-confirm" id="confirmNameBtn">确认</button>
                    </div>
                    <div class="section-title">🎙️ 指令台</div>
                    <div class="command-grid" id="commandGrid"></div>
                    <div class="director-interact">
                        <div class="talk-label">🎙️ 导演工具箱</div>
                        <div class="interact-buttons">
                            <button class="interact-btn" id="musicBtn">音乐</button>
                            <button class="interact-btn" id="lightBtn">调光</button>
                            <button class="interact-btn" id="coffeeBtn">草莓拿铁</button>
                            <button class="interact-btn" id="snackBtn">零食</button>
                        </div>
                        <div class="talk-input-area">
                            <input type="text" class="talk-input" id="directorTalkInput" placeholder="喊话，比如: 再主动一点" autocomplete="off">
                            <button class="send-btn" id="sendTalkBtn">喊话</button>
                        </div>
                    </div>
                    <div class="progress-row">
                        <button class="reset-btn" id="resetGameBtn">🎞️ 重新开拍</button>
                    </div>
                `;
            }
            
            const nameInput = document.getElementById('directorNameInput');
            const confirmBtn = document.getElementById('confirmNameBtn');
            if(confirmBtn && nameInput) {
                confirmBtn.onclick = () => {
                    let newName = nameInput.value.trim();
                    if(newName) directorName = newName;
                    else directorName = "雨披";
                    const displayDiv = document.getElementById('directorNameDisplay');
                    if(displayDiv) displayDiv.innerText = `🎬 ${directorName}导演`;
                    addLog(`🎬 导演已更名为「${directorName}」`);
                };
            }
            
            const actions = [
                { id: "kiss_deep", label: "深吻" }, { id: "neck_bite", label: "咬喉结" },
                { id: "lap_grind", label: "腿上磨蹭" }, { id: "shirt_off", label: "脱衣" },
                { id: "wall_press", label: "壁咚" }, { id: "ear_whisper_ch", label: "耳语" },
                { id: "blindfold", label: "蒙眼" }, { id: "thigh_rub", label: "大腿蹭" },
                { id: "back_hug_chest", label: "背后抱" }, { id: "floor_press", label: "地板压制" },
                { id: "belt_remove", label: "解皮带" }, { id: "hand_down", label: "手探裤腰" },
                { id: "missionary", label: "传教士" }, { id: "spoon", label: "汤匙抱" },
                { id: "teasing_deny", label: "逗弄" }, { id: "praise_kink", label: "边亲边夸" },
                { id: "hair_pull", label: "揪头发" }, { id: "table_edge", label: "桌边" },
                { id: "knee_ride", label: "跪姿" }, { id: "aftercare", label: "安抚" }
            ];
            const grid = document.getElementById('commandGrid');
            if(grid) {
                grid.innerHTML = "";
                actions.forEach(act => {
                    let btn = document.createElement('button');
                    btn.className = "cmd-btn";
                    btn.innerText = act.label;
                    btn.onclick = (function(cmd) { return function() { executeCommand(cmd); }; })(act.id);
                    grid.appendChild(btn);
                });
            }
            
            const musicBtn = document.getElementById('musicBtn');
            const lightBtn = document.getElementById('lightBtn');
            const coffeeBtn = document.getElementById('coffeeBtn');
            const snackBtn = document.getElementById('snackBtn');
            if(musicBtn) musicBtn.onclick = () => directorAction('music');
            if(lightBtn) lightBtn.onclick = () => directorAction('light');
            if(coffeeBtn) coffeeBtn.onclick = () => directorAction('coffee');
            if(snackBtn) snackBtn.onclick = () => directorAction('snack');
            
            const sendBtn = document.getElementById('sendTalkBtn');
            const talkInput = document.getElementById('directorTalkInput');
            if(sendBtn && talkInput) {
                sendBtn.onclick = () => {
                    let msg = talkInput.value.trim();
                    if(msg) directorSay(msg);
                    else directorSay("导演清了清嗓子");
                    talkInput.value = "";
                };
                talkInput.addEventListener('keypress', (e) => {
                    if(e.key === 'Enter') {
                        let msg = talkInput.value.trim();
                        if(msg) directorSay(msg);
                        talkInput.value = "";
                    }
                });
            }
            
            const resetBtn = document.getElementById('resetGameBtn');
            if(resetBtn) resetBtn.addEventListener('click', resetGame);
            
            const logDiv = document.getElementById('actionLog');
            if(logDiv) logDiv.innerHTML = " 系统: 房间规则——亲密值达标才能开门。";
            logs = [];
            addLog(` 重置房间，${directorName}导演上线。`);
            updateUI();
        }
        
        function init() {
            resetGame();
        }
        init();
    })();
</script>
</body>
</html>
