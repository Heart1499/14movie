                case "kiss_deep": deltaS=-2; deltaH=-1; deltaEsc=2+Math.floor(Math.random()*3); flavor="韩振踮起脚尖，申惟愣了一秒后低头回应。分开时两人都在喘，韩振耳朵红透。"; break;
                case "neck_bite": deltaS=-3; deltaH=-1; deltaEsc=2+Math.floor(Math.random()*3); flavor="韩振凑过去轻轻咬住申惟喉结，申惟闷哼一声仰起头，手指攥紧了韩振的衣服。"; break;
                case "lap_grind": deltaS=-3; deltaH=-2; deltaEsc=2+Math.floor(Math.random()*3); flavor="韩振跨坐在申惟腿上，缓慢磨蹭。申惟手扣住韩振的腰，韩振把脸埋进他肩膀。"; break;
                case "shirt_off": deltaS=-1; deltaH=-3; deltaEsc=2+Math.floor(Math.random()*3); flavor="申惟帮韩振脱掉上衣，指尖碰到皮肤时，韩振轻轻战栗。"; break;
                case "wall_press": deltaS=-1; deltaH=-2; deltaEsc=2+Math.floor(Math.random()*2); flavor="申惟把韩振按在墙上，韩振拽住他的衣领拉近，呼吸全落在耳侧。"; break;
                case "ear_whisper_ch": deltaS=-2; deltaH=-1; deltaEsc=2+Math.floor(Math.random()*3); flavor="韩振凑过去轻声说“哥想不想更过分一点”，申惟耳朵瞬间血红。"; break;
                case "blindfold": deltaS="-4"; deltaH="-1"; deltaEsc=2+Math.floor(Math.random()*3); flavor="蒙住申惟眼睛，韩振用手指描摹他的脸，指尖划过嘴唇。"; break;
                case "thigh_rub": deltaS="-5"; deltaH="-3"; deltaEsc=2+Math.floor(Math.random()*3); flavor="韩振用大腿蹭申惟腿间，申惟抓住他的腿，想阻止，但很显然没有完全用力。"; break;
                case "back_hug_chest": deltaS="-2"; deltaH="-2"; deltaEsc=2+Math.floor(Math.random()*3); flavor="申惟从背后抱住韩振，手放在他胸口，韩振按住他的手不让拿开。"; break;
                case "floor_press": deltaS="-2"; deltaH="-2"; deltaEsc=2+Math.floor(Math.random()*3); flavor="两人滚到地板上，正对着房间内的镜子。申惟在上方俯视韩振。"; break;
                case "belt_remove": deltaS="-5"; deltaH="-3"; deltaEsc=2+Math.floor(Math.random()*3); flavor="韩振解开申惟的皮带，金属扣碰撞的声音格外响，申惟呼吸一滞。"; break;
                case "hand_down": deltaS="-4"; deltaH="-5"; deltaEsc=2+Math.floor(Math.random()*3); flavor="申惟的手从韩振腰侧滑进裤腰，韩振轻轻哼了一声。"; break;
                case "missionary": deltaS="-6"; deltaH="-5"; deltaEsc=3+Math.floor(Math.random()*3); flavor="申惟把韩振压在床上，膝盖顶开他双腿，韩振勾住他的脖子。"; break;
                case "spoon": deltaS="-1"; deltaH="-1"; deltaEsc=2+Math.floor(Math.random()*2); flavor="申惟从背后环住韩振的腰，下巴抵着他后脑勺，安静地抱了很久。"; break;
                case "teasing_deny": deltaS="-1"; deltaH="-1"; deltaEsc=1+Math.floor(Math.random()*2); flavor="韩振逗申惟但不让他碰，申惟急了，一把拽回来轻声说“珍珍韩振不要走”。"; break;
                case "praise_kink": deltaS="-1"; deltaH="-2"; deltaEsc=2+Math.floor(Math.random()*3); flavor="申惟边亲韩振边夸他“做得好”，韩振把脸埋进他胸口。"; break;
                case "hair_pull": deltaS="-2"; deltaH="-1"; deltaEsc=2+Math.floor(Math.random()*3); flavor="韩振揪住申惟的头发，申惟吃痛反而吻得更用力。"; break;
                case "table_edge": deltaS="-3"; deltaH="-2"; deltaEsc=2+Math.floor(Math.random()*3); flavor="申惟把韩振抱上书桌边缘，韩振双腿夹住他的腰。"; break;
                case "knee_ride": deltaS="-2"; deltaH="-3"; deltaEsc=2+Math.floor(Math.random()*3); flavor="韩振跪在床上仰头看申惟，申惟伸手把他拉起来，两人一起摔进枕头里。"; break;
                case "aftercare": deltaS="-1"; deltaH="-1"; deltaEsc=1+Math.floor(Math.random()*2); flavor="申惟帮韩振擦汗，轻声问他疼不疼。韩振摇头又点头，申惟亲了亲他额头。"; break;
                default: return;
            }
            tensionS=Math.min(98,Math.max(5,tensionS+deltaS)); tensionH=Math.min(98,Math.max(5,tensionH+deltaH)); escape=Math.min(100,escape+deltaEsc);
            addLog(`${transition} ${flavor} (申惟${deltaS>=0?'+':''}${deltaS}, 韩振${deltaH>=0?'+':''}${deltaH} | +${deltaEsc}%)`);
            addDanmakuForAction();
            lastCommandDesc=flavor.substring(0,40);
            updateUI();
            if(cmdCount%4===0&&escape<85&&!ended){ let e=1; escape=Math.min(100,escape+e); addLog(` 默契渐长，房门又松动了一些 +${e}%`); updateUI();}
            if(tensionS<30&&tensionH<32&&escape<90&&!ended){ let e=1; escape=Math.min(100,escape+e); addLog(` 两人不约而同看向对方，然后同时笑了。门锁咔哒 +${e}%`); updateUI();}
            checkAccident(); if(escape>=100&&!ended){ determineEnding(); showEnding(); }
            updateUI();
        }
        
        function showEnding(){
            ended=true; gameActive=false;
            stopDanmaku();
            const title = getEndingTitle();
            const msg = getEndingMessage();
            const consoleDiv = document.getElementById('directorConsole');
            if(consoleDiv){
                consoleDiv.innerHTML = `<div class="ending-box"><div style="font-size:40px;">🔓</div><h2 style="color:#eebb77;margin:8px 0;font-size:18px;">${title}</h2><p style="color:#efdbbc;margin:12px 0;line-height:1.45;font-size:13px;">${msg}</p><div class="badge-area"><span class="ending-badge">申惟 ${Math.floor(tensionS)}%</span><span class="ending-badge">韩振 ${Math.floor(tensionH)}%</span><span class="ending-badge">指令 ${cmdCount}</span><span class="ending-badge">事故 ${accidentCount}</span></div><div class="share-hint" id="copyEndingBtn">点击可复制结果，游戏内容虚构，纯属娱乐。@JUN</div><button class="reset-btn" id="resetEndBtn" style="background:#b46f3a;margin-top:14px;">重新开拍</button></div>`;
                const resetBtn = document.getElementById('resetEndBtn');
                const copyBtn = document.getElementById('copyEndingBtn');
                if(resetBtn) resetBtn.addEventListener('click', resetGame);
                if(copyBtn) copyBtn.addEventListener('click', () => {
                    navigator.clipboard.writeText(`【小雨披大导演】${directorName}导演 · ${getDirectorStyle()}\n结局: ${title}\n${msg}\n申惟${Math.floor(tensionS)}% 韩振${Math.floor(tensionH)}% 指令${cmdCount}次 事故${accidentCount}次`).then(() => {
                        copyBtn.innerText = "✓ 已复制！";
                        setTimeout(() => { copyBtn.innerText = "点击可复制结果，游戏内容虚构，纯属娱乐。@JUN"; }, 2000);
                    });
                });
            }
        }
        
        function resetGame(){
            tensionS=68; tensionH=65; escape=0; gameActive=true; ended=false; logs=[]; lastCommandDesc=""; cmdCount=0; accidentCount=0; finalEndingType=null; styleStats={soft:0,spicy:0,chaotic:0};
            shoutCallCount = 0;
            const consoleDiv=document.getElementById('directorConsole');
            if(consoleDiv){
                consoleDiv.innerHTML=`<div class="director-name-display" id="directorNameDisplay">🎬 ${directorName}导演</div><div class="name-input-area"><span class="name-label">导演署名</span><input type="text" class="name-input" id="directorNameInput" placeholder="输入你的名字" value="${directorName}"><button class="name-confirm" id="confirmNameBtn">确认</button></div><div class="section-title">🎙️ 指令台</div><div class="command-grid" id="commandGrid"></div><div class="toy-section"><div class="toy-title">导演道具</div><div class="toy-grid" id="toyGrid"></div></div><div class="director-interact"><div class="talk-label">🎙️ 导演工具箱</div><div class="interact-buttons"><button class="interact-btn" id="musicBtn">音乐</button><button class="interact-btn" id="lightBtn">调光</button><button class="interact-btn" id="coffeeBtn">饮料</button><button class="interact-btn" id="snackBtn">零食</button><button class="photo-btn" id="photoBtn">📸 拍照</button></div><div class="talk-input-area"><input type="text" class="talk-input" id="directorTalkInput" placeholder="喊话，比如: 再主动一点" autocomplete="off"><button class="send-btn" id="sendTalkBtn">喊话</button></div></div><div class="progress-row"><button class="reset-btn" id="resetGameBtn">🎞️ 重新开拍</button></div>`;
            }
            const nameInput=document.getElementById('directorNameInput'), confirmBtn=document.getElementById('confirmNameBtn');
            if(confirmBtn&&nameInput) confirmBtn.onclick=()=>{ let nn=nameInput.value.trim(); if(nn) directorName=nn; else directorName="雨披"; const dd=document.getElementById('directorNameDisplay'); if(dd) dd.innerText=`🎬 ${directorName}导演`; addLog(`「${directorName}」导演已就位。`); };
            const grid=document.getElementById('commandGrid');
            if(grid){ grid.innerHTML=""; actionCommands.forEach(act=>{ let btn=document.createElement('button'); btn.className="cmd-btn"; btn.innerText=act.label; btn.onclick=function(){ executeCommand(act.id); }; grid.appendChild(btn); }); }
            const toyGrid=document.getElementById('toyGrid');
            if(toyGrid){ toyGrid.innerHTML=""; toys.forEach(toy=>{ let btn=document.createElement('button'); btn.className="toy-btn"; btn.innerText=toy.label; btn.onclick=function(){ useToy(toy.id); }; toyGrid.appendChild(btn); }); }
            const musicBtn=document.getElementById('musicBtn'), lightBtn=document.getElementById('lightBtn'), coffeeBtn=document.getElementById('coffeeBtn'), snackBtn=document.getElementById('snackBtn'), photoBtn=document.getElementById('photoBtn');
            if(musicBtn) musicBtn.onclick=()=>directorAction('music'); if(lightBtn) lightBtn.onclick=()=>directorAction('light'); if(coffeeBtn) coffeeBtn.onclick=()=>directorAction('coffee'); if(snackBtn) snackBtn.onclick=()=>directorAction('snack');
            if(photoBtn) photoBtn.onclick=()=>takePhoto();
            const sendBtn=document.getElementById('sendTalkBtn'), talkInput=document.getElementById('directorTalkInput');
            if(sendBtn&&talkInput){ sendBtn.onclick=()=>{ let msg=talkInput.value.trim(); if(msg) directorSay(msg); talkInput.value=""; }; talkInput.addEventListener('keypress',(e)=>{ if(e.key==='Enter'){ let msg=talkInput.value.trim(); if(msg) directorSay(msg); talkInput.value=""; } }); }
            const resetBtn=document.getElementById('resetGameBtn'); if(resetBtn) resetBtn.addEventListener('click',resetGame);
            const logDiv=document.getElementById('actionLog'); if(logDiv) logDiv.innerHTML=" 系统: 房间规则——亲密值达标才能开门。";
            logs=[]; addLog(` 重置房间，${directorName}导演上线。`); updateUI();
            startDanmaku();
        }
        function init(){ resetGame(); }
        init();
    })();
</script>
</body>
</html>
